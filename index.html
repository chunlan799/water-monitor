<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>水质监测</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #e0f2f1 0%, #e8f5e9 100%);
            min-height: 100vh;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h2 {
            color: #2e7d32;
            font-size: 28px;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
        }
        .value {
            font-size: 36px;
            font-weight: bold;
            color: #0067b8;
            margin: 12px 0;
            word-break: break-all;
        }
        .label {
            color: #555;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .status {
            color: #777;
            font-size: 13px;
            margin-top: 15px;
            padding: 8px;
            background: rgba(255,255,255,0.8);
            border-radius: 20px;
            display: inline-block;
        }
        .error {
            color: #c62828;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🌊 水质监测</h2>
        <p id="status" class="status">⏳ 正在连接设备云...</p>
    </div>
    <div class="grid">
        <div class="card">
            <div class="label">温度</div>
            <div class="value" id="temp">--</div>
            <div class="label">°C</div>
        </div>
        <div class="card">
            <div class="label">pH 值</div>
            <div class="value" id="ph">--</div>
            <div class="label">酸碱度</div>
        </div>
        <div class="card">
            <div class="label">浊度</div>
            <div class="value" id="turb">--</div>
            <div class="label">NTU</div>
        </div>
        <div class="card">
            <div class="label">水质</div>
            <div class="value" id="quality">--</div>
            <div class="label">TDS</div>
        </div>
    </div>

    <!-- 外部库（必须使用 HTTPS） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        (function() {
            // ================== 配置（根据你的设备信息修改） ==================
            const DEVICE_ID = "6a5cd5a47f2e6c302f86b74e_861037052742509";
            const DEVICE_SECRET = "87654321";   // 设备密钥
            const MQTT_HOST = "056eae522d.st1.iotda-device.cn-north-4.myhuaweicloud.com";  // WebSocket 主机
            const MQTT_PORT = 443;
            const MQTT_PATH = "/mqtt";          // WebSocket 固定路径
            // 设备上报主题（平台转发用）
            const TOPIC_REPORT = "$oc/devices/" + DEVICE_ID + "/sys/properties/report";
            // =================================================================

            // 获取当前时间戳并生成签名密码（华为云规范）
            function getPassword(secret) {
                const timestamp = Math.floor(Date.now() / 1000);   // 秒级时间戳
                const hash = CryptoJS.HmacSHA256(timestamp.toString(), secret);
                const hashBase64 = CryptoJS.enc.Base64.stringify(hash);
                return timestamp + "." + hashBase64;
            }

            // 连接函数
            function connectMQTT() {
                // 使用唯一 ClientID 避免与物理设备冲突
                const clientId = DEVICE_ID + "_" + Date.now();
                const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_PATH, clientId);

                const options = {
                    useSSL: true,
                    userName: DEVICE_ID,
                    password: getPassword(DEVICE_SECRET),   // 动态密码
                    cleanSession: true,
                    keepAliveInterval: 60,                  // 心跳间隔
                    onSuccess: function () {
                        updateStatus("✅ 已连接，等待数据...", false);
                        client.subscribe(TOPIC_REPORT, { qos: 0 });
                        console.log("订阅成功:", TOPIC_REPORT);
                    },
                    onFailure: function (err) {
                        updateStatus("❌ 连接失败: " + err.errorMessage, true);
                        console.error("MQTT 连接失败:", err);
                    }
                };

                // 接收消息
                client.onMessageArrived = function (message) {
                    try {
                        const payload = JSON.parse(message.payloadString);
                        let props = {};

                        // 华为云标准上报格式: { services: [{ properties: {...} }] }
                        if (payload.services && Array.isArray(payload.services) && payload.services.length > 0) {
                            props = payload.services[0].properties || {};
                        } else {
                            // 兼容其他格式
                            props = payload;
                        }

                        // 更新四个指标
                        if (props.temperature !== undefined && props.temperature !== null) {
                            document.getElementById('temp').textContent = Number(props.temperature).toFixed(1);
                        }
                        if (props.ph !== undefined && props.ph !== null) {
                            document.getElementById('ph').textContent = Number(props.ph).toFixed(1);
                        }
                        if (props.turbidity !== undefined && props.turbidity !== null) {
                            document.getElementById('turb').textContent = Number(props.turbidity).toFixed(1);
                        }
                        if (props.quality !== undefined && props.quality !== null) {
                            document.getElementById('quality').textContent = Number(props.quality).toFixed(1);
                        }

                        updateStatus("📡 数据已更新 " + new Date().toLocaleTimeString(), false);
                        console.log("收到属性数据:", props);
                    } catch (e) {
                        console.error("消息解析失败:", e);
                        updateStatus("⚠️ 数据格式错误", true);
                    }
                };

                // 断线重连
                client.onConnectionLost = function (responseObject) {
                    updateStatus("🔌 连接断开，5 秒后重连...", true);
                    setTimeout(connectMQTT, 5000);
                };

                // 开始连接
                client.connect(options);
            }

            // 辅助函数：更新状态文字
            function updateStatus(text, isError) {
                const statusEl = document.getElementById('status');
                statusEl.innerHTML = isError ? `<span class="error">${text}</span>` : text;
            }

            // 启动连接
            connectMQTT();
        })();
    </script>
</body>
</html>
