<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>水质监测</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #e0f2f1 0%, #e8f5e9 100%); min-height: 100vh; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: #2e7d32; font-size: 28px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 25px 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .value { font-size: 36px; font-weight: bold; color: #0067b8; margin: 12px 0; word-break: break-all; }
        .label { color: #555; font-size: 14px; letter-spacing: 0.5px; }
        .status { color: #777; font-size: 13px; margin-top: 15px; padding: 8px 20px; background: rgba(255,255,255,0.9); border-radius: 20px; display: inline-block; }
        .error { color: #c62828; font-weight: bold; }
        .success { color: #2e7d32; }
    </style>
</head>
<body>
    <div class="header"><h2>🌊 水质监测</h2><p id="status" class="status">⏳ 正在连接云平台...</p></div>
    <div class="grid">
        <div class="card"><div class="label">温度</div><div class="value" id="temp">--</div><div class="label">°C</div></div>
        <div class="card"><div class="label">pH值</div><div class="value" id="ph">--</div><div class="label">酸碱度</div></div>
        <div class="card"><div class="label">浊度</div><div class="value" id="turb">--</div><div class="label">NTU</div></div>
        <div class="card"><div class="label">水质</div><div class="value" id="quality">--</div><div class="label">TDS</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>

    <script>
    (function() {
        // ==================== 设备配置 ====================
        const DEVICE_ID = "6a5cd5a47f2e6c302f86b74e_861037052742509";
        const DEVICE_SECRET = "db3105d42b552fd94bc0";
        const MQTT_HOST = "056eae522d.st1.iotda-device.cn-north-4.myhuaweicloud.com";
        const MQTT_PORT = 443;
        const MQTT_PATH = "/mqtt";
        const TOPIC_REPORT = "$oc/devices/" + DEVICE_ID + "/sys/properties/report";
        // ==================================================

        const statusEl = document.getElementById('status');

        function getPassword(secret) {
            const ts = Math.floor(Date.now() / 1000);
            return ts + "." + CryptoJS.enc.Base64.stringify(CryptoJS.HmacSHA256(ts.toString(), secret));
        }

        const wsUrl = "wss://" + MQTT_HOST + ":" + MQTT_PORT + MQTT_PATH;

        // 注意：clientId 格式必须正确！
        // 密钥认证设备推荐格式：设备ID_时间戳 或 直接使用设备ID
        const clientId = DEVICE_ID + "_" + Date.now();   // 方案A，也可改为 DEVICE_ID 直接测试

        const client = mqtt.connect(wsUrl, {
            clientId: clientId,
            username: DEVICE_ID,
            password: getPassword(DEVICE_SECRET),
            clean: true,
            keepalive: 60,
            reconnectPeriod: 5000,
            connectTimeout: 30 * 1000
        });

        client.on('connect', function() {
            statusEl.innerHTML = '<span class="success">✅ 已连接，等待数据...</span>';
            client.subscribe(TOPIC_REPORT, { qos: 0 }, function(err) {
                if (err) statusEl.innerHTML = '<span class="error">❌ 订阅失败: ' + err.message + '</span>';
            });
        });

        client.on('message', function(topic, message) {
            try {
                const payload = JSON.parse(message.toString());
                const props = (payload.services && payload.services[0] && payload.services[0].properties) || payload;
                if (props.temperature !== undefined) document.getElementById('temp').textContent = Number(props.temperature).toFixed(1);
                if (props.ph !== undefined) document.getElementById('ph').textContent = Number(props.ph).toFixed(1);
                if (props.turbidity !== undefined) document.getElementById('turb').textContent = Number(props.turbidity).toFixed(1);
                if (props.quality !== undefined) document.getElementById('quality').textContent = Number(props.quality).toFixed(1);
                statusEl.innerHTML = '<span class="success">📡 数据已更新 ' + new Date().toLocaleTimeString() + '</span>';
            } catch(e) {}
        });

        client.on('error', function(err) {
            statusEl.innerHTML = '<span class="error">❌ 连接错误: ' + err.message + '</span>';
        });
        client.on('close', function() { statusEl.textContent = '🔌 连接已断开...'; });
        client.on('reconnect', function() { statusEl.textContent = '🔄 正在重连...'; });
    })();
    </script>
</body>
</html>
